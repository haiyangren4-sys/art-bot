name: Art Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # UTC 07:00 = 北京时间 15:00

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python daily_pipeline.py
