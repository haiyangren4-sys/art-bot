name: Art Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'   # 每5分钟运行一次（稳定方案）

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python daily_pipeline.py
